<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>供应链图谱V3.0</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020b14;
      --panel: rgba(4, 19, 32, .76);
      --panel2: rgba(8, 30, 48, .72);
      --line: rgba(70, 181, 247, .22);
      --line2: rgba(50, 184, 255, .62);
      --text: #eaf7ff;
      --muted: #8fa8bb;
      --cyan: #23c3ff;
      --blue: #2789ff;
      --green: #62db9a;
      --amber: #ffc44d;
      --orange: #ff9b3d;
      --red: #ff5d72;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      overflow: hidden;
      background:
        radial-gradient(circle at 52% 38%, rgba(16, 101, 164, .32), transparent 42rem),
        linear-gradient(rgba(57, 144, 205, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57, 144, 205, .035) 1px, transparent 1px),
        linear-gradient(150deg, #041522 0%, #020b14 52%, #010711 100%);
      background-size: auto, 40px 40px, 40px 40px, auto;
    }
    button, select { font: inherit; }
    button { cursor: pointer; }

    .shell {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 76px minmax(720px, 1fr) 330px;
      grid-template-rows: 58px minmax(0, 1fr) 198px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(7, 22, 36, .6), rgba(2, 9, 18, .92));
    }

    .rail {
      grid-row: 1 / 4;
      border-right: 1px solid rgba(72, 171, 233, .18);
      background: rgba(2, 13, 25, .84);
      display: grid;
      grid-template-rows: 64px 1fr 64px;
      z-index: 6;
    }
    .logo {
      display: grid;
      place-items: center;
    }
    .logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 30% 25%, #4be0ff, #0578ef 72%);
      box-shadow: 0 0 22px rgba(35, 195, 255, .34);
      font-weight: 900;
      color: #00111f;
    }
    .nav {
      display: grid;
      align-content: start;
      gap: 4px;
      padding-top: 12px;
    }
    .nav-btn {
      width: 100%;
      height: 74px;
      border: 0;
      border-left: 3px solid transparent;
      color: #8097ad;
      background: transparent;
      display: grid;
      place-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .nav-btn b { font-size: 19px; line-height: 1; }
    .nav-btn.active {
      color: #5bd8ff;
      border-left-color: var(--cyan);
      background: linear-gradient(90deg, rgba(35, 195, 255, .18), transparent);
      box-shadow: inset 0 0 24px rgba(35, 195, 255, .04);
    }

    .topbar {
      grid-column: 2 / 4;
      border-bottom: 1px solid rgba(72, 171, 233, .16);
      background: rgba(2, 13, 25, .58);
      display: grid;
      grid-template-columns: minmax(270px, 1fr) auto;
      align-items: center;
      gap: 16px;
      padding: 0 18px 0 24px;
      z-index: 5;
    }
    .title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0;
      text-shadow: 0 0 22px rgba(35, 195, 255, .2);
    }
    .tabs, .toolbar, .segmented {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tabs {
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .topbar .tabs { display: none; }
    .tab, .tool, .segment, .mode {
      height: 34px;
      border: 1px solid rgba(94, 181, 235, .22);
      color: #9fb5c8;
      background: rgba(4, 18, 30, .64);
      border-radius: 8px;
      padding: 0 14px;
      white-space: nowrap;
    }
    .tab.active, .segment.active, .mode.active, .tool.active {
      color: #eaf8ff;
      border-color: rgba(35, 195, 255, .72);
      background: rgba(20, 122, 206, .32);
      box-shadow: inset 0 0 18px rgba(35, 195, 255, .12), 0 0 18px rgba(35, 195, 255, .08);
    }
    .tab.framework {
      position: relative;
      min-width: max-content;
      border-radius: 999px;
      padding: 0 16px;
      background:
        linear-gradient(90deg, rgba(35, 195, 255, .08), rgba(98, 219, 154, .04)),
        rgba(4, 18, 30, .62);
    }
    .tab.framework::before {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(35, 195, 255, .72), transparent);
    }
    .tool {
      width: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 16px;
    }
    select.mode { display: none; }

    .stage {
      grid-column: 2;
      grid-row: 2;
      position: relative;
      overflow: hidden;
      min-width: 0;
    }
    .stage::after {
      content: "";
      position: absolute;
      left: 10%;
      right: 8%;
      bottom: 18px;
      height: 1px;
        background: linear-gradient(90deg, transparent, rgba(35, 195, 255, .36), transparent);
      pointer-events: none;
    }
    .stage::before {
      content: "";
      position: absolute;
      left: 4%;
      right: 5%;
      top: 10%;
      bottom: 10%;
      border: 1px solid rgba(35, 195, 255, .08);
      border-radius: 24px;
      background:
        radial-gradient(ellipse at 42% 54%, rgba(35, 195, 255, .12), transparent 48%),
        linear-gradient(130deg, transparent 0 58%, rgba(31, 125, 211, .08) 58% 68%, transparent 68%);
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
    }
    .stage.assembled-structure::before { opacity: 1; }
    .stage.wind-structure .model-wrap {
      opacity: 0;
      pointer-events: none;
    }
    .stage.wind-structure.three-fallback .model-wrap {
      opacity: 1;
      pointer-events: auto;
    }
    .stage.wind-structure.three-fallback .scene-viewport {
      opacity: .42;
      filter: saturate(.78);
    }
    .stage.wind-structure.three-ready .model-wrap {
      opacity: 0;
      pointer-events: none;
    }
    .model-wrap {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 14px 18px 10px;
      perspective: 1200px;
    }
    .model-img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      filter:
        saturate(1.08)
        contrast(1.04)
        drop-shadow(0 32px 50px rgba(0, 0, 0, .46))
        drop-shadow(0 0 22px rgba(35, 195, 255, .18));
      transform-origin: 50% 55%;
      transition: transform .32s ease, filter .28s ease;
      user-select: none;
      pointer-events: none;
    }
    .stage.assembled-structure .model-img {
      opacity: 0;
      transform: scale(.96);
    }
    .stage.exploded .model-img {
      opacity: 0;
      transform: scale(.96);
      filter: saturate(1.14) contrast(1.05) brightness(1.03) drop-shadow(0 35px 56px rgba(0,0,0,.48));
    }
    .stage.rotate .model-img { animation: breathe 4s ease-in-out infinite alternate; }
    @keyframes breathe { from { transform: translateX(-5px) scale(1.01); } to { transform: translateX(5px) scale(1.035); } }

    .assembly {
      position: absolute;
      inset: 26px 22px 20px;
      transform-style: preserve-3d;
      opacity: 0;
      pointer-events: none;
      transform: scale(.98);
      transition: transform .45s ease, opacity .24s ease;
    }
    .assembly::before {
      content: "";
      position: absolute;
      left: 9%;
      right: 8%;
      bottom: 6%;
      height: 18%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(35, 195, 255, .18), transparent 68%);
      filter: blur(14px);
      opacity: .78;
      pointer-events: none;
    }
    .stage.assembled-structure .assembly {
      opacity: 1;
      pointer-events: auto;
      transform: rotateX(0deg) rotateY(0deg) translateY(-2px) scale(1);
    }
    .stage.exploded .assembly {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-8px) scale(1.02);
    }
    .stage.pv-structure:not(.exploded) .assembly {
      transform: translateY(-6px) scale(1.18);
    }
    .stage.storage-structure:not(.exploded) .assembly,
    .stage.offshore-structure:not(.exploded) .assembly {
      transform: translateY(-8px) scale(1.1);
    }
    .stage.storage-structure:not(.exploded) .assembly::after,
    .stage.offshore-structure:not(.exploded) .assembly::after {
      content: "";
      position: absolute;
      left: 24%;
      right: 18%;
      bottom: 18%;
      height: 16%;
      border: 1px solid rgba(80, 196, 255, .2);
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(31, 148, 204, .12), rgba(4, 24, 42, .5)),
        repeating-linear-gradient(90deg, rgba(147, 218, 255, .12) 0 1px, transparent 1px 42px);
      transform: perspective(760px) rotateX(62deg) rotateZ(-8deg);
      box-shadow: inset 0 0 26px rgba(35,195,255,.07), 0 22px 40px rgba(0,0,0,.28);
      pointer-events: none;
      z-index: 0;
    }
    .stage.selected .assembly-part:not(.active) {
      opacity: .18;
      filter: grayscale(.28) saturate(.65) blur(.35px);
    }
    .assembly-part {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: var(--h);
      border: 0;
      padding: 0;
      background: transparent;
      transform:
        translate(var(--dx, 0), var(--dy, 0))
        scale(var(--s, 1));
      transition: transform .42s cubic-bezier(.2,.8,.2,1), opacity .25s ease, filter .25s ease;
      z-index: var(--z, 1);
    }
    .stage.assembled-structure:not(.exploded) .assembly-part {
      transform:
        translate(0, 0)
        scale(var(--s, 1));
    }
    .stage.assembled-structure:not(.exploded) .assembly-part img {
      filter:
        saturate(1.15)
        contrast(1.08)
        drop-shadow(0 24px 34px rgba(0,0,0,.48))
        drop-shadow(0 0 18px rgba(35,195,255,.18));
    }
    .stage.assembled-structure:not(.exploded) .assembly-part::before {
      content: "";
      position: absolute;
      inset: 18% 8%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(35, 195, 255, .18), transparent 64%);
      transform: translateY(42%);
      filter: blur(12px);
      opacity: .42;
      z-index: -1;
      pointer-events: none;
    }
    .assembly-part img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter:
        saturate(1.12)
        contrast(1.06)
        drop-shadow(0 22px 28px rgba(0,0,0,.42))
        drop-shadow(0 0 15px rgba(35,195,255,.16));
      pointer-events: none;
    }
    .assembly-part.active {
      opacity: 1 !important;
      z-index: 20;
      transform:
        translate(var(--sel-dx, var(--dx, 0)), var(--sel-dy, var(--dy, 0)))
        scale(var(--sel-s, 1.34));
    }
    .assembly-part.active img {
      filter:
        saturate(1.22)
        contrast(1.1)
        drop-shadow(0 26px 36px rgba(0,0,0,.5))
        drop-shadow(0 0 26px rgba(35,195,255,.48));
    }
    .assembly-part::after {
      content: attr(aria-label);
      position: absolute;
      left: 50%;
      bottom: -18px;
      transform: translateX(-50%);
      padding: 3px 8px;
      border-radius: 999px;
      color: #dff7ff;
      background: rgba(3, 17, 30, .82);
      border: 1px solid rgba(35, 195, 255, .24);
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity .18s ease;
      pointer-events: none;
    }
    .assembly-part:hover::after,
    .assembly-part.active::after { opacity: 1; }
    .stage.assembled-structure:not(.exploded) .assembly-part::after {
      bottom: -12px;
      opacity: .56;
      border-color: rgba(35, 195, 255, .18);
      background: rgba(3, 17, 30, .58);
    }
    .stage.assembled-structure:not(.exploded) .assembly-part:hover::after,
    .stage.assembled-structure:not(.exploded) .assembly-part.active::after {
      opacity: 1;
    }

    .structure-switch {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 8;
      display: none;
      gap: 8px;
      padding: 6px;
      border: 1px solid rgba(94, 181, 235, .18);
      border-radius: 999px;
      background: rgba(3, 15, 27, .72);
      box-shadow: inset 0 0 18px rgba(35,195,255,.06), 0 14px 28px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
    }
    .stage.wind-structure .structure-switch { display: none; }
    .stage:not(.wind-structure) .structure-switch { display: flex; }
    .stage:not(.wind-structure) #resetViewBtn { display: none; }
    .structure-switch button {
      height: 30px;
      min-width: 62px;
      border: 1px solid rgba(94, 181, 235, .2);
      border-radius: 999px;
      color: #a9c2d6;
      background: rgba(8, 31, 51, .62);
      padding: 0 12px;
      font-size: 12px;
    }
    .structure-switch button.active {
      color: #eaf8ff;
      border-color: rgba(35, 195, 255, .68);
      background: linear-gradient(90deg, rgba(26, 117, 202, .56), rgba(35, 195, 255, .16));
      box-shadow: 0 0 18px rgba(35,195,255,.16);
    }

    .scene-viewport {
      position: absolute;
      inset: 24px 30px 20px;
      display: none;
      overflow: hidden;
      border: 1px solid rgba(38, 172, 234, .18);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(5, 18, 34, .18), rgba(0, 4, 11, .72)),
        radial-gradient(circle at 42% 48%, rgba(14, 113, 165, .32), transparent 44%),
        linear-gradient(90deg, rgba(32, 200, 255, .035) 1px, transparent 1px) 0 0 / 58px 58px,
        linear-gradient(rgba(32, 200, 255, .03) 1px, transparent 1px) 0 0 / 58px 58px,
        #030b17;
      box-shadow:
        inset 0 0 34px rgba(35, 195, 255, .04),
        0 24px 58px rgba(0, 0, 0, .36);
    }
    .stage.wind-structure .scene-viewport { display: block; }
    #turbineCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .scene-shade {
      pointer-events: none;
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0, 6, 16, .34), transparent 22%, transparent 76%, rgba(0, 6, 16, .4)),
        linear-gradient(180deg, rgba(1, 10, 22, .42), transparent 24%, rgba(0, 2, 8, .5));
    }
    .hotspot-layer {
      pointer-events: none;
      position: absolute;
      inset: 0;
      z-index: 3;
    }
    .hotspot {
      appearance: none;
      position: absolute;
      min-width: 126px;
      padding: 6px 9px 7px 22px;
      transform: translate(-10px, -58px);
      border: 0;
      border-left: 1px solid rgba(35, 204, 255, .9);
      background: transparent;
      color: #dff8ff;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.2;
      text-align: left;
      text-shadow: 0 1px 12px rgba(0, 0, 0, .8);
      filter: drop-shadow(0 0 10px rgba(32, 200, 255, .5));
      pointer-events: auto;
    }
    .hotspot::before {
      position: absolute;
      left: 0;
      bottom: -36px;
      width: 1px;
      height: 40px;
      content: "";
      background: linear-gradient(var(--cyan), rgba(32, 200, 255, 0));
    }
    .hotspot::after {
      position: absolute;
      left: -4px;
      bottom: -39px;
      width: 7px;
      height: 7px;
      content: "";
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 14px var(--cyan);
    }
    .hotspot strong {
      display: block;
      margin-bottom: 2px;
      font-size: 13px;
    }
    .hotspot small {
      display: block;
      color: #8fb5c8;
    }
    .hotspot.is-selected {
      min-width: 160px;
      border: 1px solid rgba(82, 230, 183, .7);
      border-radius: 8px;
      background: rgba(5, 49, 74, .72);
      box-shadow:
        inset 0 0 24px rgba(32, 200, 255, .12),
        0 10px 34px rgba(0, 0, 0, .28);
    }
    .focus-card { display: none; }
    .scene-status {
      position: absolute;
      top: 16px;
      right: 18px;
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 34px;
      padding: 0 14px;
      border: 1px solid rgba(70, 194, 255, .2);
      border-radius: 8px;
      background: rgba(2, 16, 28, .68);
      color: #9eb8c7;
      font-size: 12px;
    }
    .scene-status strong { color: var(--cyan); }
    .scene-controls {
      position: absolute;
      left: 50%;
      bottom: 18px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 8px;
      width: min(92%, 520px);
      padding: 7px;
      transform: translateX(-50%);
      border: 1px solid rgba(45, 173, 232, .26);
      border-radius: 10px;
      background: rgba(2, 15, 27, .72);
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 34px rgba(0, 0, 0, .32);
    }
    .control-button {
      height: 34px;
      min-width: 96px;
      border: 1px solid rgba(77, 185, 239, .35);
      border-radius: 8px;
      background: rgba(3, 23, 38, .74);
      color: #bed4e4;
      padding: 0 13px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }
    .control-button.is-active {
      border-color: rgba(52, 204, 255, .74);
      background: linear-gradient(180deg, rgba(24, 143, 202, .48), rgba(4, 47, 74, .84));
      color: #f3fbff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 0 18px rgba(32,200,255,.18);
    }
    .explode-slider {
      display: grid;
      align-items: center;
      grid-template-columns: auto minmax(90px, 1fr);
      gap: 8px;
      min-width: 170px;
      margin-left: 2px;
      color: #9fb6c7;
      font-size: 12px;
    }
    .explode-slider input {
      width: 100%;
      accent-color: var(--cyan);
    }
    .three-status {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 2;
      transform: translate(-50%, -50%);
      width: min(520px, 72%);
      padding: 16px 18px;
      border: 1px solid rgba(35, 195, 255, .28);
      border-radius: 12px;
      background: rgba(3, 17, 30, .72);
      color: #bfe8f8;
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
      box-shadow: 0 18px 42px rgba(0,0,0,.32);
      pointer-events: none;
    }
    .three-status.ready { display: none; }
    .stage.three-fallback .three-status {
      display: block;
      top: 18px;
      transform: translateX(-50%);
      width: auto;
      max-width: 680px;
      padding: 8px 12px;
      color: #ffdca8;
      border-color: rgba(255, 196, 77, .42);
      background: rgba(44, 28, 8, .72);
      box-shadow: 0 10px 28px rgba(0,0,0,.24);
    }

    .callout {
      position: absolute;
      z-index: 2;
      left: var(--x);
      top: var(--y);
      width: var(--w, 120px);
      height: var(--h, 42px);
      padding: 0;
      color: transparent;
      background: rgba(35, 195, 255, .01);
      border: 1px solid transparent;
      border-radius: 9px;
      display: block;
      overflow: visible;
      backdrop-filter: blur(10px);
      font-size: 0;
      text-indent: -999px;
      transition: background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .callout::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 50%;
      width: 7px;
      height: 7px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: var(--cyan);
      opacity: 0;
      box-shadow: 0 0 14px var(--cyan);
      transition: opacity .18s ease;
    }
    .callout::after {
      content: attr(aria-label);
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #eaf8ff;
      font-size: 12px;
      line-height: 1;
      opacity: 0;
      text-indent: 0;
      white-space: nowrap;
      text-shadow: 0 0 12px rgba(35, 195, 255, .65);
      pointer-events: none;
      transition: opacity .18s ease;
    }
    .callout:hover,
    .callout.active {
      border-color: rgba(98, 219, 154, .62);
      background: rgba(35, 195, 255, .07);
      box-shadow: inset 0 0 18px rgba(35, 195, 255, .12), 0 0 18px rgba(35, 195, 255, .14);
    }
    .callout:hover::before,
    .callout.active::before,
    .callout:hover::after,
    .callout.active::after { opacity: 1; }

    .right {
      grid-column: 3;
      grid-row: 2 / 4;
      border-left: 1px solid rgba(72, 171, 233, .16);
      background: rgba(2, 13, 24, .72);
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 12px;
      overflow: auto;
      z-index: 4;
    }
    .panel {
      border: 1px solid rgba(94, 181, 235, .2);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(9, 31, 49, .76), rgba(4, 17, 30, .76));
      padding: 15px;
      box-shadow: inset 0 0 24px rgba(35, 195, 255, .04);
    }
    .framework-panel {
      background:
        radial-gradient(circle at 84% 18%, rgba(35, 195, 255, .16), transparent 42%),
        linear-gradient(180deg, rgba(9, 31, 49, .82), rgba(4, 17, 30, .76));
    }
    .framework-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 118px;
      gap: 12px;
      align-items: center;
    }
    .framework-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }
    .framework-chip {
      min-width: 0;
      height: 28px;

    .bom-card {

      text-align: left;
      padding: 11px;

      background: linear-gradient(90deg, var(--cyan), rgba(35, 195, 255, .08));

    .bom-card.part-tab {
      display: grid;

      place-items: center;
      gap: 8px;
      text-align: center;
      padding: 12px 10px 18px;

      font-size: 15px;
      letter-spacing: 0;

    .part-thumb {

    .part-thumb::before,
    .part-thumb::after {
      content: "";
      position: absolute;
      inset: 9px 8px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(80, 203, 255, .92), rgba(24, 95, 171, .84));
      border: 1px solid rgba(185, 237, 255, .42);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.28), inset -10px -10px 18px rgba(0, 12, 26, .3);
    }
    .part-thumb::after {
      inset: 14px 8px 5px 13px;
      background: linear-gradient(135deg, rgba(12, 61, 112, .82), rgba(4, 26, 52, .72));
      transform: translate(7px, 7px);
      z-index: -1;
      opacity: .8;
    }
    .part-thumb.blade::before {
      inset: 8px 5px;
      clip-path: polygon(8% 48%, 100% 36%, 100% 48%, 22% 57%, 100% 67%, 100% 78%);
      border-radius: 999px;
      background: linear-gradient(90deg, #e8f8ff, #79d9ff 54%, #1d89da);
    }
    .part-thumb.bearing::before,
    .part-thumb.yaw::before {
      inset: 6px;
      border-radius: 50%;
      background: radial-gradient(circle, transparent 34%, #d8f5ff 36%, #5cb9e8 52%, #114b82 72%);
    }
    .part-thumb.gearbox::before {
      background: linear-gradient(135deg, #78b8ff, #1b65ba);
      clip-path: polygon(16% 18%, 76% 8%, 94% 34%, 82% 82%, 24% 90%, 6% 58%);
    }
    .part-thumb.generator::before,
    .part-thumb.cooling::before {
      inset: 10px 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, #3f5163, #d4edf7 18%, #516579 45%, #1c2f42 100%);
    }
    .part-thumb.converter::before {
      inset: 5px 14px;
      border-radius: 4px;
      background: linear-gradient(135deg, #d6e5ef, #687887 54%, #1e2a36);
    }
    .part-thumb.pitch::before {
      inset: 8px;
      border-radius: 50%;
      background: conic-gradient(from 20deg, #31d4ff, #1164b7, #31d4ff);
      clip-path: polygon(50% 0, 62% 34%, 100% 50%, 62% 66%, 50% 100%, 38% 66%, 0 50%, 38% 34%);

    .part-thumb.real {
      width: 86px;
      height: 58px;
      object-fit: contain;
      transform: none;
      border-radius: 9px;
      padding: 2px;
      background:

      border: 1px solid rgba(94, 181, 235, .12);

      transition: transform .2s ease, filter .2s ease, border-color .2s ease;
    }
    .bom-card:hover .part-thumb.real,
    .bom-card.active .part-thumb.real {
      transform: translateY(-2px) scale(1.06);
      border-color: rgba(35, 195, 255, .38);
      filter: saturate(1.2) contrast(1.08) drop-shadow(0 14px 18px rgba(0,0,0,.42)) drop-shadow(0 0 14px rgba(35,195,255,.18));

    .status {

    .toast {

      top: 68px;

      z-index: 20;

      box-shadow: 0 0 24px rgba(35, 195, 255, .16);

      .bom-track { overflow-x: auto; display: flex; }
      .bom-card { flex: 0 0 145px; }
      .callout { transform: scale(.86); transform-origin: left top; }

    function renderFramework(v) {
      const names = v.frameworkSuppliers || v.models || [];
      const shares = v.frameworkShares || names.map(() => Math.round(100 / Math.max(1, names.length)));
      const colors = ["#23c3ff", "#62db9a", "#ffc44d", "#7fa9ff", "#b284ff", "#ff9b3d", "#8aa1b5", "#eb6b88"];
      $("frameworkTitle").textContent = `${v.nav} · 框采供应商`;
      $("frameworkList").innerHTML = names.slice(0, 8).map((name, i) => `
        <div class="framework-chip" style="--chip-color:${colors[i % colors.length]}"><b>${name}</b></div>
      `).join("");
      let start = 0;
      const total = shares.reduce((sum, value) => sum + Number(value || 0), 0) || 100;
      const segments = shares.slice(0, 8).map((value, i) => {
        const size = Number(value || 0) / total * 100;
        const end = start + size;
        const segment = `${colors[i % colors.length]} ${start.toFixed(2)}% ${end.toFixed(2)}%`;
        start = end;
        return segment;
      });
      start = 0;
      const labels = shares.slice(0, 8).map((value, i) => {
        const size = Number(value || 0) / total;
        const angle = (start + size / 2) * 360;
        start += size;
        return `<span class="pie-label" style="--angle:${angle.toFixed(1)}deg">${value}%</span>`;
      }).join("");
      $("frameworkDonut").style.setProperty("--framework-pie", `conic-gradient(${segments.join(", ")})`);
      $("frameworkDonut").innerHTML = `<b>框采<br>份额</b>${labels}`;
    }

        { x: "33%", y: "42%", w: "44%", h: "12%", dx: "-72px", dy: "42px", s: 1.04, z: 4 },
        { x: "31%", y: "46%", w: "46%", h: "15%", dx: "58px", dy: "86px", s: 1.04, z: 3 },
        { x: "59%", y: "53%", w: "14%", h: "15%", dx: "128px", dy: "104px", s: 1.03, z: 6 },
        { x: "30%", y: "51%", w: "47%", h: "10%", dx: "-96px", dy: "126px", s: 1.04, z: 2 }
      ],
      storage: [
        { x: "31%", y: "57%", w: "13%", h: "18%", dx: "-160px", dy: "78px", s: 1.02, z: 8 },
        { x: "39%", y: "33%", w: "23%", h: "34%", dx: "-94px", dy: "-82px", s: 1.08, z: 9 },
        { x: "26%", y: "38%", w: "15%", h: "17%", dx: "-158px", dy: "-94px", s: 1.04, z: 10 },
        { x: "61%", y: "37%", w: "19%", h: "29%", dx: "96px", dy: "-78px", s: 1.07, z: 9 },
        { x: "48%", y: "61%", w: "16%", h: "18%", dx: "0", dy: "118px", s: 1.02, z: 8 },
        { x: "69%", y: "49%", w: "18%", h: "25%", dx: "150px", dy: "58px", s: 1.04, z: 8 },
        { x: "44%", y: "65%", w: "18%", h: "22%", dx: "-70px", dy: "126px", s: 1.02, z: 7 },

      ],
      offshore: [
        { x: "35%", y: "39%", w: "19%", h: "27%", dx: "-138px", dy: "18px", s: 1.05, z: 6 },
        { x: "51%", y: "40%", w: "21%", h: "23%", dx: "-50px", dy: "36px", s: 1.05, z: 6 },
        { x: "64%", y: "51%", w: "16%", h: "21%", dx: "68px", dy: "96px", s: 1.03, z: 5 },
        { x: "61%", y: "25%", w: "23%", h: "21%", dx: "136px", dy: "-86px", s: 1.04, z: 8 },
        { x: "26%", y: "24%", w: "21%", h: "22%", dx: "-136px", dy: "-108px", s: 1.04, z: 8 },
        { x: "45%", y: "24%", w: "16%", h: "21%", dx: "0px", dy: "-116px", s: 1.04, z: 8 },
        { x: "25%", y: "60%", w: "18%", h: "23%", dx: "-96px", dy: "130px", s: 1.03, z: 4 },
        { x: "50%", y: "62%", w: "17%", h: "22%", dx: "132px", dy: "132px", s: 1.03, z: 4 }
      ]
    };

    function renderSuppliers(v) {
      const partName = currentPart(v)[0];
      const suppliers = currentSuppliers(v);
      if (state.supplier >= suppliers.length) state.supplier = 0;
      $("supplierTitle").textContent = `${partName} · 供应商`;
      $("supplierList").innerHTML = suppliers.map((s, i) => `
        <button class="supplier-row ${i === state.supplier ? "active" : ""}" data-supplier="${i}">
          <span>${i + 1}</span><span>${s[0]}</span><span class="bar"><i style="--w:${Math.min(100, s[1] * 2.2)}%"></i></span><span>${s[1]}%</span>
        </button>
      `).join("");
      $("supplierList").querySelectorAll(".supplier-row").forEach(btn => {
        btn.onclick = () => { state.supplier = Number(btn.dataset.supplier); renderRight(v); notify(`供应商：${currentSuppliers(v)[state.supplier][0]}`); };
      });
    }

    function renderRight(v) {
      const partName = currentPart(v)[0];
      const suppliers = currentSuppliers(v);
      const selectedSupplier = suppliers[state.supplier] || suppliers[0];
      renderFramework(v);
      renderSuppliers(v);
      $("marketTitle").textContent = `${partName} · 市场份额`;
      $("donutValue").textContent = `${selectedSupplier[1]}%`;
      $("legend").innerHTML = suppliers.slice(0, 5).map((s, i) => `<span><b><i style="background:${["#23c3ff","#62db9a","#ffc44d","#8797aa","#2789ff"][i]}"></i>${s[0]}</b><em>${s[1]}%</em></span>`).join("");
    }

    function renderBom(v) {
      $("bomTitle").textContent = v.bomTitle;
      $("bomTrack").innerHTML = v.callouts.map((p, i) => `
        <button class="bom-card part-tab ${i === state.part ? "active" : ""}" data-part="${i}">
          <img class="part-thumb real" src="${partThumbSrc(v.key, p[0])}" alt="${p[0]}3D缩略图" loading="lazy">
          <b>${p[0]}</b>
        </button>
      `).join("");
      $("bomTrack").querySelectorAll(".bom-card").forEach(btn => {
        btn.onclick = () => {
          state.part = Number(btn.dataset.part);
          state.highlightPart = state.part;
          state.exploded = true;
          state.supplier = 0;
          render();
          if (v.key === "wind") {
            window.dispatchEvent(new CustomEvent("wind-part-focus", { detail: { name: v.callouts[state.part][0] } }));
          }
          notify(`已切换部件：${v.callouts[state.part][0]}`);
        };
      });
    }

    function render() {
      const v = views[state.view];
      renderNav();
      renderTop(v);
      renderStage(v);
      renderRight(v);
      renderBom(v);
      history.replaceState(null, "", `#${v.key}`);
    }

    $("exportBtn").onclick = () => notify("已生成当前 BOM 导出任务");
    $("compareBtn").onclick = () => notify("已加入横向对比");
    $("searchBtn").onclick = () => notify("搜索面板：可接公司/部件检索");
    $("fullBtn").onclick = () => document.documentElement.requestFullscreen?.();
    $("settings").onclick = () => notify("设置：数据源、行情刷新、关注列表");
    ["frameworkMore","supplierMore","marketMore"].forEach(id => $(id).onclick = () => notify("打开详情抽屉"));
    window.addEventListener("wind-three-select", event => {
      if (views[state.view].key !== "wind") return;
      const partName = windThreeToPart[event.detail?.id];
      if (!partName) return;
      const partIndex = views[state.view].callouts.findIndex(item => item[0] === partName);
      if (partIndex < 0) return;
      state.part = partIndex;
      state.highlightPart = partIndex;
      state.exploded = true;
      state.supplier = 0;
      renderRight(views[state.view]);
      renderBom(views[state.view]);
      notify(`3D 部件：${partName}`);
    });
    $("combineBtn").onclick = event => {
      event.stopPropagation();
      state.exploded = false;
      state.highlightPart = null;
      state.supplier = 0;
      render();
      notify(views[state.view].key === "wind" ? "已组合为完整机舱结构" : "已回到 2D 合成主图");
    };
    $("explodeBtn").onclick = event => {
      event.stopPropagation();
      state.exploded = true;
      if (views[state.view].key !== "wind") state.highlightPart = null;
      render();
      notify(views[state.view].key === "wind" ? "已展开部件结构" : "已爆炸为 3D 部件");
    };
    $("resetViewBtn").onclick = event => {
      event.stopPropagation();
      state.exploded = false;
      state.highlightPart = null;
      state.supplier = 0;
      render();
      notify("视图已复位");
    };
    $("stage").onclick = () => {
      if (views[state.view].key === "wind") return;
      state.exploded = !state.exploded;
      if (!state.exploded) state.highlightPart = null;
      renderStage(views[state.view]);
      notify(state.exploded ? "主图已展开" : "主图已合并");
    };

    const initial = { wind: 0, pv: 1, storage: 2, offshore: 3 }[location.hash.replace("#", "")];
    if (initial != null) state.view = initial;
    render();
    window.addEventListener("hashchange", () => {
      const next = { wind: 0, pv: 1, storage: 2, offshore: 3 }[location.hash.replace("#", "")];
      if (next == null || next === state.view) return;
      state.view = next;
      state.part = 0;
      state.highlightPart = null;
      state.tab = 0;
      state.supplier = 0;
      state.exploded = false;
      render();
    });
    window.setTimeout(() => {
      const stage = $("stage");
      const status = $("threeStatus");
      if (status?.dataset.state === "error") return;
      if (views[state.view].key === "wind" && !stage.classList.contains("three-ready")) {
        stage.classList.add("three-fallback");
        status.dataset.state = "fallback";
        status.textContent = "当前浏览器未成功渲染 WebGL 3D，已临时显示部件组合主图。建议使用本地 HTTP 或 Chrome 打开。";
      }
    }, 2500);
  </script>
  <script>
    window.addEventListener("error", event => {
      const source = String(event.filename || "");
      const isThreeModule = source.includes("/assets/wind-three/") || source.includes("/vendor/three.module.js");
      if (!isThreeModule) return;
      const status = document.getElementById("threeStatus");
      const stage = document.getElementById("stage");
      if (stage) stage.classList.add("three-fallback");
      if (status) {
        status.dataset.state = "error";
        status.textContent = `3D 模块加载失败：${event.message || "请使用本地 HTTP 地址打开页面"}`;
      }
    }, true);

    window.addEventListener("unhandledrejection", event => {
      const status = document.getElementById("threeStatus");
      const stage = document.getElementById("stage");
      if (!status || status.dataset.state === "ready") return;
      const reason = event?.reason?.message || event?.reason || "未知异步错误";
      if (stage) stage.classList.add("three-fallback");
      status.dataset.state = "error";
      status.textContent = `3D 模块异步加载失败：${reason}`;
    });
  </script>
  <script src="assets/wind-three/wind-three-bundle.js?v=v3-20260715"></script>
</body>
